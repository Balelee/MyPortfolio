<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>404 - Page introuvable | Infinity Coder</title>
  <link href="assets/img/logo_infinity.png" rel="icon">
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a12;
      color: #f0f0f5;
      font-family: 'Poppins', sans-serif;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(24, 210, 110, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(10, 189, 227, 0.04) 0%, transparent 50%);
    }
    .container {
      text-align: center;
      padding: 40px 20px;
      max-width: 520px;
    }
    .error-code {
      font-size: 120px;
      font-weight: 700;
      background: linear-gradient(135deg, #18d26e, #0abde3);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      line-height: 1;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #18d26e, #0abde3);
      color: #000;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(24,210,110,0.3);
      transition: all 0.3s;
    }
    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(24,210,110,0.4);
    }
    .links {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .links a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.3s;
    }
    .links a:hover {
      color: #18d26e;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Page introuvable</h1>
    <p>La page que vous recherchez n'existe pas ou a été déplacée. Pas d'inquiétude, vous pouvez retourner à l'accueil ou explorer mes autres pages.</p>
    <a href="index.html" class="btn-home">Retour à l'accueil</a>
    <div class="links">
      <a href="about.html">À propos</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="resume.html">Mon CV</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</body>

</html>
